; Waveshare ESP32-S3-Touch-LCD-3.5 (320×480 IPS, ST7796 SPI, FT6336 Touch) + GM861 Barcode-Scanner
[env:waveshare_esp32s3_touch_lcd_35]
; pioarduino: community fork mit Arduino ESP32 3.x (IDF 5.x) Unterstützung
platform = https://github.com/pioarduino/platform-espressif32/releases/download/stable/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 16 MB Flash, OPI PSRAM (ESP32-S3R8)
; memory_type = qio_opi → QIO-Flash + OPI-PSRAM (Arduino ESP32 3.x Syntax)
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000
board_build.partitions = partitions.csv
board_build.filesystem = littlefs
board_build.arduino.memory_type = qio_opi

; Arduino_GFX mit ST7796 Standard-SPI Treiber
lib_deps =
    moononournation/GFX Library for Arduino@^1.4.9
    bblanchon/ArduinoJson@^7.1.0
    mathieucarbou/ESPAsyncWebServer@^3.3.23
    mathieucarbou/AsyncTCP@^3.2.14
    knolleary/PubSubClient@^2.8
    h2zero/NimBLE-Arduino@^2.0.0

extra_scripts = pre:extra_script.py

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DASYNCWEBSERVER_REGEX=1
    ; Display-Auflösung: ST7796 3.5" IPS, Portrait 320×480
    -DDISPLAY_W=320
    -DDISPLAY_H=480
    ; BLE (NimBLE) – kein Bluetooth Classic benötigt auf ESP32-S3
    -DCONFIG_BT_NIMBLE_ENABLED=1
