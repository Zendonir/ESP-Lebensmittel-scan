; Waveshare ESP32-S3 1.64" AMOLED + GM861 Barcode-Scanner
[env:waveshare_esp32s3_amoled_164]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder

; 16 MB Flash, OPI PSRAM (ESP32-S3R8)
board_upload.flash_size = 16MB
board_build.flash_mode = qio
board_build.f_flash = 80000000
board_build.partitions = partitions.csv
board_build.filesystem = littlefs

; Arduino_GFX statt TFT_eSPI (RM67162 braucht QSPI, kein Standard-SPI)
lib_deps =
    moononournation/GFX Library for Arduino@^1.4.9
    bblanchon/ArduinoJson@^7.1.0
    mathieucarbou/ESPAsyncWebServer@^3.3.23
    mathieucarbou/AsyncTCP@^3.2.14

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue
    ; Display-Auflösung (zentral definiert, wird in config.h referenziert)
    -DDISPLAY_W=280
    -DDISPLAY_H=456
