name: Build & Release Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version (z.B. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      tag:    ${{ steps.ver.outputs.tag }}
      title:  ${{ steps.ver.outputs.title }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
      short_sha: ${{ steps.ver.outputs.short_sha }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini') }}
          restore-keys: pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run -e waveshare_esp32s3_touch_lcd_35

      - name: Determine version
        id: ver
        run: |
          SHORT=$(git rev-parse --short HEAD)
          COUNT=$(git rev-list --count HEAD)
          echo "short_sha=${SHORT}" >> $GITHUB_OUTPUT

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.version }}"
            echo "tag=${TAG}"          >> $GITHUB_OUTPUT
            echo "title=Release ${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=false"   >> $GITHUB_OUTPUT

          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=${TAG}"           >> $GITHUB_OUTPUT
            echo "title=Release ${TAG}" >> $GITHUB_OUTPUT
            echo "prerelease=false"     >> $GITHUB_OUTPUT

          else
            # Jeder Push zu main → "latest" Pre-Release
            echo "tag=latest"                                >> $GITHUB_OUTPUT
            echo "title=Latest Build #${COUNT} (${SHORT})" >> $GITHUB_OUTPUT
            echo "prerelease=true"                           >> $GITHUB_OUTPUT
          fi

      - name: Rename artifact
        run: |
          mkdir -p dist
          cp .pio/build/waveshare_esp32s3_touch_lcd_35/firmware.bin \
             dist/firmware-${{ steps.ver.outputs.tag }}.bin

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/firmware-${{ steps.ver.outputs.tag }}.bin
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (für git tag)
        uses: actions/checkout@v4

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist

      # "latest"-Tag + Release löschen bevor neu erstellt wird
      - name: Delete old 'latest' release
        if: needs.build.outputs.tag == 'latest'
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ needs.build.outputs.tag }}
          name:       ${{ needs.build.outputs.title }}
          prerelease: ${{ needs.build.outputs.prerelease }}
          files:      dist/firmware-${{ needs.build.outputs.tag }}.bin
          generate_release_notes: ${{ needs.build.outputs.prerelease == 'false' }}
          body: |
            **Commit:** `${{ needs.build.outputs.short_sha }}`
            **Branch/Ref:** `${{ github.ref_name }}`

            Flash über Weboberfläche: System → OTA Update → `firmware-${{ needs.build.outputs.tag }}.bin` hochladen
            Oder direkt via PlatformIO mit `--upload-port`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
