name: Build & Release Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
      - 'V*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release-Version (z.B. v1.0.0)'
        required: true
        default: 'v1.0.0'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run -e waveshare_esp32s3_amoled_164

      - name: Copy firmware artifact
        run: |
          mkdir -p dist
          cp .pio/build/waveshare_esp32s3_amoled_164/firmware.bin dist/firmware.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/firmware.bin
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: |
      startsWith(github.ref, 'refs/tags/v') ||
      startsWith(github.ref, 'refs/tags/V') ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
    steps:
      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          fi

      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          files: dist/firmware.bin
          generate_release_notes: true
          name: "Firmware ${{ steps.version.outputs.tag }}"
          body: |
            ## Firmware ${{ steps.version.outputs.tag }}

            Flash die `firmware.bin` über die Weboberfläche des Geräts
            (System → OTA Update → Firmware flashen) oder direkt via PlatformIO.

            **OTA-Update aus der Weboberfläche:** System → GitHub OTA → „Prüfen & Installieren“
