name: Build & Release Firmware

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            .pio/libdeps
          key: pio-${{ hashFiles('platformio.ini') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: platformio run -e waveshare_esp32s3_amoled_164

      - name: Copy firmware artifact
        run: |
          mkdir -p dist
          cp .pio/build/waveshare_esp32s3_amoled_164/firmware.bin dist/firmware.bin

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: dist/firmware.bin
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - name: Download firmware artifact
        uses: actions/download-artifact@v4
        with:
          name: firmware
          path: dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/firmware.bin
          generate_release_notes: true
          name: "Firmware ${{ github.ref_name }}"
          body: |
            ## Firmware ${{ github.ref_name }}

            Flash die `firmware.bin` über die Weboberfläche des Geräts
            (System → OTA Update → Firmware flashen) oder direkt via PlatformIO.

            **OTA-Update aus der Weboberfläche:** System → GitHub OTA → "Prüfen & Installieren"
