name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache PlatformIO packages
        uses: actions/cache@v4
        with:
          path: ~/.platformio
          key: ${{ runner.os }}-pio-${{ hashFiles('platformio.ini') }}
          restore-keys: ${{ runner.os }}-pio-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build firmware
        run: pio run -e waveshare_esp32s3_amoled_164

      - name: Rename firmware binary
        run: |
          cp .pio/build/waveshare_esp32s3_amoled_164/firmware.bin \
             firmware-${{ github.ref_name }}.bin

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Lebensmittel-Scanner ${{ github.ref_name }}"
          body: |
            ## Lebensmittel-Scanner ${{ github.ref_name }}

            ### Was ist neu
            - 9 neue konfigurierbare UI-Felder (button_margin, list_radius, sub_hdr_h, cat_hdr_h, power_save_min, date_format, show_clock, sound_ok, sound_err)
            - Design-Tab komplett überarbeitet: 5 Unter-Tabs (Themes / Farben / Layout / Verhalten / Export-Import)
            - 8 Preset-Themes inkl. Neon, Candy, Mocha
            - 3-Screen Live-Vorschau (Kategorien / Produkte / Datum) im Web-Interface
            - JSON-Export & Import für Themes
            - Datumsformat wählbar: Deutsch / US / ISO
            - Buzzer-Töne per Kategorie (Erfolg / Fehler) ein-/ausschaltbar
            - Stromsparmodus jetzt konfigurierbar (Minuten, 0 = deaktiviert)
            - Clock-Anzeige ein-/ausschaltbar

            ### Firmware flashen
            1. Web-Interface öffnen → **OTA**-Tab
            2. `firmware-${{ github.ref_name }}.bin` auswählen und flashen
          files: firmware-${{ github.ref_name }}.bin
          draft: false
          prerelease: false
